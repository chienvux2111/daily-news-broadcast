name = "news-engine"
main = "src/adapters/cloudflare.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Channel runner: every 30min + hourly token refresh for X/Threads
[triggers]
crons = ["*/30 * * * *", "0 * * * *"]

[[kv_namespaces]]
binding = "NEWS_CACHE"
id = "8d9fb458825a46b68c7efcca93133b51"

[vars]
AI_PROVIDER = "openai"
AI_MODEL = "gpt-4o-mini"
BROADCAST_MODE = "drip"
DRIP_BATCH_SIZE = "5"
DRIP_DELAY_MS = "3600000"
MAX_ARTICLES_PER_SOURCE = "3"
MAX_ARTICLES = "15"
CONCURRENCY_LIMIT = "5"
SUMMARY_LANGUAGE = "vi"
CRON_SCHEDULE = "0 1,7,13 * * *"
