name: News Broadcast Cron

on:
  schedule:
    # 07:00 UTC = 14:00 Asia/Bangkok / 14:00 Asia/Ho_Chi_Minh
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: news-broadcast-cron
  cancel-in-progress: false

jobs:
  run-broadcast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore file cache
        id: news-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/news.json
          key: news-cache-${{ github.run_id }}
          restore-keys: |
            news-cache-

      - name: Install dependencies
        run: npm ci

      - name: Run broadcast
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          CUSTOM_AI_API_KEY: ${{ secrets.CUSTOM_AI_API_KEY }}
          CUSTOM_AI_BASE_URL: ${{ secrets.CUSTOM_AI_BASE_URL }}
          CUSTOM_AI_NAME: ${{ secrets.CUSTOM_AI_NAME }}
          OLLAMA_BASE_URL: ${{ secrets.OLLAMA_BASE_URL }}
          CACHE_TYPE: file
          CACHE_PATH: ./.cache/news.json
          SUMMARY_LANGUAGE: ${{ secrets.SUMMARY_LANGUAGE }}
          TARGET_AUDIENCE: ${{ secrets.TARGET_AUDIENCE }}
          MAX_ARTICLES: ${{ secrets.MAX_ARTICLES }}
          MAX_ARTICLES_PER_SOURCE: ${{ secrets.MAX_ARTICLES_PER_SOURCE }}
          CONCURRENCY_LIMIT: ${{ secrets.CONCURRENCY_LIMIT }}
          EXTRA_RSS_FEEDS: ${{ secrets.EXTRA_RSS_FEEDS }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_SOURCE_USERS: ${{ secrets.X_SOURCE_USERS }}
          X_SOURCE_MIN_ENGAGEMENT: ${{ secrets.X_SOURCE_MIN_ENGAGEMENT }}
          X_SOURCE_MAX_RESULTS_PER_USER: ${{ secrets.X_SOURCE_MAX_RESULTS_PER_USER }}
          X_SOURCE_INCLUDE_REPLIES: ${{ secrets.X_SOURCE_INCLUDE_REPLIES }}
          X_SOURCE_INCLUDE_REPOSTS: ${{ secrets.X_SOURCE_INCLUDE_REPOSTS }}
          X_SOURCE_INCLUDE_QUOTES: ${{ secrets.X_SOURCE_INCLUDE_QUOTES }}
          X_SOURCE_KEYWORDS: ${{ secrets.X_SOURCE_KEYWORDS }}
          BROADCAST_MODE: ${{ secrets.BROADCAST_MODE }}
          DRIP_BATCH_SIZE: ${{ secrets.DRIP_BATCH_SIZE }}
          DRIP_DELAY_MS: ${{ secrets.DRIP_DELAY_MS }}
        run: npm run start -- --force

      - name: Save file cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/news.json
          key: news-cache-${{ github.run_id }}
